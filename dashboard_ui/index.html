<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHub Admin Console</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --card: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            /* Indigo */
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            padding: 20px;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span {
            color: var(--accent);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 5px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .nav-btn.active {
            background: var(--accent);
            color: white;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            /* Removing padding to handle layout manually */
            overflow: hidden;
            position: relative;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        /* Tabs */
        .tab-content {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .tab-content.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards & Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .status-badge.online {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Actions */
        .action-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Global Terminal Footer */
        .terminal-footer {
            height: 35%;
            /* Fixed height for terminal */
            min-height: 200px;
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: #111;
            padding: 8px 15px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
            flex-shrink: 0;
        }

        .terminal-out {
            flex: 1;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #ccc;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .term-clean-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
        }

        .term-clean-btn:hover {
            color: #fff;
        }

        /* Utils */
        .row {
            display: flex;
            gap: 10px;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        /* Color classes for terminal */
        .c-red {
            color: #ff5555;
        }

        .c-green {
            color: #50fa7b;
        }

        .c-yellow {
            color: #f1fa8c;
        }

        .c-blue {
            color: #8be9fd;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="brand">🎓 UniHub <span>Console</span></div>

        <button class="nav-btn active" onclick="switchTab('overview')">🏠 Overview</button>
        <button class="nav-btn" onclick="switchTab('control')">⚙️ Controls</button>
        <button class="nav-btn" onclick="switchTab('git')">☁️ Git Deploy</button>
        <button class="nav-btn" onclick="switchTab('backup')">💾 Backups</button>

        <div class="sidebar-footer">
            <div style="font-size: 0.8rem; color: #666; text-align: center; margin-bottom: 15px;" id="ip-display">IP:
                Checking...</div>
            <button class="action-btn btn-danger" onclick="shutdownPanel()">❌ Shutdown Panel</button>
        </div>
    </div>

    <div class="main">
        <div class="content-area">
            <!-- TAB: OVERVIEW -->
            <div id="tab-overview" class="tab-content active">
                <div class="grid">
                    <div class="card">
                        <h3>System Status</h3>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <div class="status-badge" id="badge-backend">
                                <div class="dot"></div> Backend
                            </div>
                            <div class="status-badge" id="badge-db">
                                <div class="dot"></div> Database
                            </div>
                            <div class="status-badge" id="badge-frontend">
                                <div class="dot"></div> Frontend
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Quick Actions</h3>
                        <button class="action-btn btn-success" onclick="api('/api/start-all')">🚀 START ALL
                            SYSTEMS</button>
                        <button class="action-btn btn-danger" onclick="api('/api/stop-all')">⏹ STOP ALL SYSTEMS</button>
                        <div class="row">
                            <button class="action-btn" onclick="window.open('https://cbellory.online', '_blank')">🌐
                                Website</button>
                            <button class="action-btn"
                                onclick="window.open('https://cbellory.online/admin', '_blank')">🛡️ Admin</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB: CONTROL -->
            <div id="tab-control" class="tab-content">
                <div class="grid">
                    <div class="card">
                        <h3>Backend & API</h3>
                        <button class="action-btn" onclick="api('/api/start-backend')">▶ Start Backend</button>
                        <button class="action-btn" onclick="api('/api/restart-backend')">🔄 Restart Backend</button>
                        <button class="action-btn btn-danger" onclick="api('/api/stop-backend')">⏹ Stop Backend</button>
                    </div>

                    <div class="card">
                        <h3>Database (MongoDB)</h3>
                        <button class="action-btn btn-success" onclick="api('/api/start-db')">🛡️ Safe Start DB</button>
                        <button class="action-btn" onclick="api('/api/repair-db')">🔧 Repair Indices</button>
                        <button class="action-btn btn-danger" onclick="api('/api/hard-reset-db')">🧨 Hard Reset
                            Data</button>
                    </div>

                    <div class="card">
                        <h3>Build Tools</h3>
                        <button class="action-btn" onclick="api('/api/build-frontend')">🔨 Build Client (React)</button>
                        <button class="action-btn" onclick="api('/api/build-admin')">🔨 Build Admin Panel</button>
                    </div>
                </div>
            </div>

            <!-- TAB: GIT -->
            <div id="tab-git" class="tab-content">
                <div class="card">
                    <h3>Git Operations</h3>
                    <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">
                        Use these controls to sync your code with GitHub.
                    </p>
                    <div class="grid">
                        <button class="action-btn" onclick="checkGitStatus()">🔍 Check Status</button>
                        <button class="action-btn btn-primary" onclick="gitPush()">⬆ Push to GitHub</button>
                        <button class="action-btn btn-success" onclick="api('/api/git-pull')">⬇ Pull Updates</button>
                    </div>
                </div>
            </div>

            <!-- TAB: BACKUP -->
            <div id="tab-backup" class="tab-content">
                <div class="grid">
                    <div class="card">
                        <h3>Create Backup</h3>
                        <button class="action-btn btn-primary" onclick="api('/api/backup-db')">💾 Backup Database
                            Now</button>
                        <button class="action-btn" onclick="api('/api/backup-project')">📦 Backup Project Files</button>
                    </div>

                    <div class="card">
                        <h3>Restore Database</h3>
                        <select id="backup-select">
                            <option>Loading...</option>
                        </select>
                        <button class="action-btn btn-danger" onclick="triggerRestore()">♻ Restore Selected
                            Backup</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GLOBAL TERMINAL -->
        <div class="terminal-footer">
            <div class="terminal-header">
                <span>SYSTEM LOGS (Global)</span>
                <div>
                    <button class="term-clean-btn" onclick="copyLog()" style="margin-right: 10px;">COPY</button>
                    <button class="term-clean-btn" onclick="clearTerm()">CLEAR</button>
                </div>
            </div>
            <div class="terminal-out" id="console">Waiting for logs...</div>
        </div>
    </div>

    <script>
        // --- TABS LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

            document.getElementById('tab-' + tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // --- TERMINAL LOGIC ---
        const term = document.getElementById('console');

        function log(msg) {
            const div = document.createElement('div');
            // Clean ANSI codes roughly
            msg = msg.replace(/\u001b\[\d+m/g, '');

            if (msg.toLowerCase().includes('error')) div.className = 'c-red';
            if (msg.toLowerCase().includes('success')) div.className = 'c-green';
            if (msg.includes('> Executing')) div.className = 'c-blue';

            div.innerText = msg;
            term.appendChild(div);
            // Auto-scroll
            term.scrollTop = term.scrollHeight;
        }

        function clearTerm() { term.innerHTML = ''; }
        function copyLog() { navigator.clipboard.writeText(term.innerText); alert('Copied!'); }

        // --- API CALLS ---
        async function api(url) {
            try {
                await fetch(url, { method: 'POST' });
            } catch (e) { log('Error: ' + e.message); }
        }

        // --- GIT FUNCTIONS ---
        async function checkGitStatus() {
            log('--- Checking Git Status ---');
            try {
                const res = await fetch('/api/git-status');
                const d = await res.json();
                log(d.output || d.error);
                log('---------------------------');
            } catch (e) { log('Git Error: ' + e.message); }
        }

        async function gitPush() {
            const msg = prompt('Commit Message:', 'Update from Dashboard');
            if (!msg) return;

            log('--> Make sure you wait for "Push Completed" message!');
            log('Starting Git Push: ' + msg);
            try {
                await fetch('/api/git-push', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
            } catch (e) { log('API Error: ' + e.message); }
        }

        // --- SYSTEM STATUS SOCKET ---
        const ws = new WebSocket('ws://' + window.location.host);

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);

            if (msg.type === 'status') {
                updateStatus(msg.id, msg.isRunning);
            } else {
                log(msg.data);
            }
        };

        function updateStatus(id, active) {
            // Map IDs to UI elements
            const map = {
                'backend': 'badge-backend',
                'db-start': 'badge-db',
                'frontend': 'badge-frontend'
            };

            if (map[id]) {
                const el = document.getElementById(map[id]);
                if (el) {
                    el.className = 'status-badge ' + (active ? 'online' : 'offline');
                }
            }
        }

        // --- INIT ---
        fetch('/api/ip').then(r => r.json()).then(d => document.getElementById('ip-display').innerText = 'LAN IP: ' + d.ip);

        function loadBackups() {
            fetch('/api/get-db-backups').then(r => r.json()).then(list => {
                const sel = document.getElementById('backup-select');
                sel.innerHTML = '';
                list.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.text = b.replace('backup_', '');
                    sel.add(opt);
                });
            });
        }
        loadBackups();

        async function triggerRestore() {
            const folder = document.getElementById('backup-select').value;
            if (confirm('⚠️ Restore from ' + folder + '? Current data will be lost.')) {
                await fetch('/api/restore-db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder })
                });
            }
        }

        async function restartPanel() {
            if (confirm('Restart the Dashboard Panel? (Page will reload)')) {
                await api('/api/restart-self');
                setTimeout(() => location.reload(), 3000);
            }
        }

        async function shutdownPanel() {
            if (confirm('Stop the Dashboard Panel?')) api('/api/shutdown');
        }
    </script>
</body>

</html>
